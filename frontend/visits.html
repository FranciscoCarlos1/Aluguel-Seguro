<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agenda de Visitas - Aluguel Seguro</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body class="page-visits" data-page="visits">
    <div class="backdrop"></div>
    <header class="site-header">
      <a class="brand" href="index.html">Aluguel Seguro</a>
      <nav class="nav-links">
        <a href="dashboard.html" data-auth-only>Painel</a>
        <a href="properties.html" data-auth-only>Imoveis</a>
        <a href="leads.html" data-auth-only>Interesses</a>
        <a href="visits.html" data-auth-only>Visitas</a>
        <a href="services.html" data-auth-only>Servicos</a>
        <a href="support.html" data-auth-only>Suporte</a>
        <div class="session-status">
          <span data-session-label>Sem sessao</span>
          <button class="button ghost session-action" type="button" data-session-action>Entrar</button>
        </div>
      </nav>
    </header>

    <main class="panel panel-wide">
      <section class="panel-card panel-card--wide reveal section-stack">
        <div>
          <h1>Agenda e suporte humanizado</h1>
          <p class="muted">A equipe cuida do contato por telefone e WhatsApp, alinha horarios e deixa a visita pronta para o locador apenas receber o candidato.</p>
        </div>

        <p class="form-status" data-visit-status></p>

        <div class="visit-grid">
          <article class="info-card">
            <h2 class="lane-title">Solicitacoes abertas</h2>
            <div class="section-stack" data-visit-pending></div>
          </article>
          <article class="info-card">
            <h2 class="lane-title">Visitas confirmadas</h2>
            <div class="section-stack" data-visit-confirmed></div>
          </article>
        </div>
      </section>
    </main>

    <script src="env.js"></script>
    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/portal.js"></script>
  </body>
</html>
