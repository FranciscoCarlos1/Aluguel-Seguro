services:
  - type: web
    name: aluguel-seguro-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/data/database.sqlite
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: CORS_ALLOWED_ORIGINS
        sync: false
    disk:
      name: aluguel-seguro-data
      mountPath: /var/data
      sizeGB: 1

  - type: web
    name: aluguel-seguro
    runtime: static
    rootDir: frontend
    buildCommand: >-
      sh -c "mkdir -p assets/css assets/js && cp ../assets/css/styles.css assets/css/styles.css && cp ../assets/js/app.js assets/js/app.js && cp ../assets/js/portal.js assets/js/portal.js && echo \"window.ALUGUEL_API_BASE_URL='${RENDER_BACKEND_URL}/api/v1';\" > env.js"
    staticPublishPath: .
    envVars:
      - key: RENDER_BACKEND_URL
        sync: false
