services:
  - type: web
    name: aluguel-seguro-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: aluguel-seguro-db
          property: connectionString
      - key: DB_HOST
        fromDatabase:
          name: aluguel-seguro-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: aluguel-seguro-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: aluguel-seguro-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: aluguel-seguro-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: aluguel-seguro-db
          property: password
      - key: DB_SSLMODE
        value: require
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  - type: web
    name: aluguel-seguro
    runtime: static
    rootDir: frontend
    buildCommand: >-
      sh -c "mkdir -p assets/css assets/js && cp ../assets/css/styles.css assets/css/styles.css && cp ../assets/js/app.js assets/js/app.js && cp ../assets/js/portal.js assets/js/portal.js && echo \"window.ALUGUEL_API_BASE_URL='${RENDER_BACKEND_URL}/api/v1';\" > env.js"
    staticPublishPath: .
    envVars:
      - key: RENDER_BACKEND_URL
        sync: false

databases:
  - name: aluguel-seguro-db
    plan: basic-256mb
    region: oregon
    databaseName: Aluguel_Seguro
    user: admin
